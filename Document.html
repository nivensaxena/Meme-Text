        <style>
                body {
    text-align: center;
    font-family: sans-serif;
}

h1 {
    color: yellow;
    font-size: 50px;
    text-shadow: 2px 2px 2px black;
}

input {
    padding: 5px;
    margin: 20px;
    width: 400px;
}

#output {
    font-size: 36px;
    color: white;
    text-shadow: 2px 2px 2px black;
    height: 350px;
    width: 500px;
    background-image: url("spongebob_meme_64.webp");
    background-size: cover;
    background-position: center;
    margin: auto;
}

    </head>
    <body>
        <h1>Meme Writer</h1>
        <input type="text" placeholder="Type in the meme you want to memeify.">
        <button onclick="convertText()">CreATe MEmE</button>
        <div id="output">YgIG</div>
        <script>
                let inputEl = document.querySelector("input");
let outputEl = document.querySelector("#output");

function convertText() {
    let inputString = inputEl.value;
    let inputArray = inputString.split("");
    let outputArray = [];

    for (let i = 0; i < inputArray.length; i++) {
        let letter = inputArray[i];

        let randomNum = Math.random();

        if (randomNum < 0.5) {
            outputArray.push(letter.toUpperCase());
        } else {
            outputArray.push(letter);
        }
    }
    outputEl.innerHTML = outputArray.join("");
}

        </script>
